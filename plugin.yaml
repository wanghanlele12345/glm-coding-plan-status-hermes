name: zai-statusline
version: 2.0.0
description: >
  Z.AI / Zhipu AI Coding Plan usage monitor for Hermes.
  Displays real-time token quota, MCP usage, estimated cost, and model
  info in a Claude Code-style status bar.  Prints status bar to terminal
  via post_llm_call hook and provides a zai_usage tool for on-demand queries.
author: converted from glm-coding-plan-statusline (jeongsk)
requires_env:
  - ANTHROPIC_BASE_URL
  - ANTHROPIC_AUTH_TOKEN
provides_tools:
  - zai_usage
provides_hooks:
  - post_llm_call
